<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020408"/>
      <stop offset="100%" stop-color="#060d18"/>
    </linearGradient>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0066ff"/>
    </linearGradient>
    <linearGradient id="gp" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7b2fff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#00d4ff" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Glow orb left -->
  <ellipse cx="200" cy="315" rx="180" ry="180" fill="rgba(0,102,255,0.08)"/>
  <!-- Glow orb right -->
  <ellipse cx="1050" cy="315" rx="160" ry="160" fill="rgba(123,47,255,0.06)"/>

  <!-- ── LOGO LEFT (scaled down, centered at x=220 y=315) ── -->
  <g transform="translate(60,155) scale(0.8)">
    <!-- Corner brackets -->
    <path d="M16,52 L16,16 L52,16" fill="none" stroke="url(#g)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M148,16 L184,16 L184,52" fill="none" stroke="url(#g)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M16,148 L16,184 L52,184" fill="none" stroke="url(#g)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M148,184 L184,184 L184,148" fill="none" stroke="url(#g)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Circle -->
    <circle cx="100" cy="100" r="68" fill="rgba(0,212,255,0.07)"/>
    <circle cx="100" cy="100" r="68" fill="none" stroke="url(#g)" stroke-width="2.5"/>
    <!-- Trunk -->
    <line x1="100" y1="158" x2="100" y2="108" stroke="url(#g)" stroke-width="4" stroke-linecap="round"/>
    <!-- Branches -->
    <line x1="100" y1="130" x2="72" y2="114" stroke="url(#g)" stroke-width="3" stroke-linecap="round"/>
    <line x1="100" y1="130" x2="128" y2="114" stroke="url(#g)" stroke-width="3" stroke-linecap="round"/>
    <line x1="100" y1="118" x2="78" y2="103" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="100" y1="118" x2="122" y2="103" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="100" y1="110" x2="100" y2="88" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="72" y1="114" x2="56" y2="103" stroke="url(#g)" stroke-width="2" stroke-linecap="round"/>
    <line x1="72" y1="114" x2="67" y2="98" stroke="url(#g)" stroke-width="2" stroke-linecap="round"/>
    <line x1="78" y1="103" x2="62" y2="90" stroke="url(#g)" stroke-width="2" stroke-linecap="round"/>
    <line x1="128" y1="114" x2="144" y2="103" stroke="url(#g)" stroke-width="2" stroke-linecap="round"/>
    <line x1="128" y1="114" x2="133" y2="98" stroke="url(#g)" stroke-width="2" stroke-linecap="round"/>
    <line x1="122" y1="103" x2="138" y2="90" stroke="url(#g)" stroke-width="2" stroke-linecap="round"/>
    <line x1="100" y1="88" x2="86" y2="75" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="100" y1="88" x2="114" y2="75" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Nodes -->
    <circle cx="56" cy="103" r="5" fill="url(#g)" filter="url(#glow)"/>
    <circle cx="67" cy="98" r="4.5" fill="url(#g)" filter="url(#glow)"/>
    <circle cx="62" cy="90" r="4" fill="url(#g)" filter="url(#glow)"/>
    <circle cx="144" cy="103" r="5" fill="url(#g)" filter="url(#glow)"/>
    <circle cx="133" cy="98" r="4.5" fill="url(#g)" filter="url(#glow)"/>
    <circle cx="138" cy="90" r="4" fill="url(#g)" filter="url(#glow)"/>
    <circle cx="86" cy="75" r="4" fill="url(#g)" filter="url(#glow)"/>
    <circle cx="114" cy="75" r="4" fill="url(#g)" filter="url(#glow)"/>
    <circle cx="100" cy="158" r="6" fill="url(#g)" filter="url(#glow)"/>
  </g>

  <!-- Divider line -->
  <line x1="280" y1="140" x2="280" y2="490" stroke="url(#g)" stroke-width="1" opacity="0.25"/>

  <!-- ── TEXT RIGHT ── -->
  <!-- Tag -->
  <text x="320" y="210" font-family="'Courier New', monospace" font-size="18" fill="#00d4ff" letter-spacing="6" opacity="0.8">INDUSTRY 4.0 AUTOMATION</text>

  <!-- Company name -->
  <text x="318" y="300" font-family="Arial Black, Arial, sans-serif" font-size="72" font-weight="900" fill="white" letter-spacing="-2">Morde</text>
  <text x="318" y="300" font-family="Arial Black, Arial, sans-serif" font-size="72" font-weight="900" fill="url(#gp)" letter-spacing="-2">
    <tspan dx="220">Tech</tspan>
  </text>

  <!-- Tagline -->
  <text x="320" y="358" font-family="Arial, sans-serif" font-size="26" fill="rgba(255,255,255,0.6)" letter-spacing="0.5">Engineering Intelligent Automation</text>

  <!-- Separator -->
  <rect x="320" y="385" width="600" height="1" fill="url(#g)" opacity="0.2"/>

  <!-- Stats row -->
  <g font-family="'Courier New', monospace" font-size="16" fill="rgba(255,255,255,0.45)" letter-spacing="1">
    <text x="320" y="430">150+ PROJECTS</text>
    <text x="540" y="430">80+ CLIENTS</text>
    <text x="720" y="430">99.8% AI ACCURACY</text>
  </g>

  <!-- Website URL -->
  <text x="320" y="490" font-family="'Courier New', monospace" font-size="18" fill="url(#g)" opacity="0.7">mordetech-solutions.in</text>
</svg>
