<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0066ff"/>
    </linearGradient>
  </defs>

  <!-- Corner brackets -->
  <path d="M10,52 L10,10 L52,10" fill="none" stroke="url(#g)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M148,10 L190,10 L190,52" fill="none" stroke="url(#g)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M10,148 L10,190 L52,190" fill="none" stroke="url(#g)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M148,190 L190,190 L190,148" fill="none" stroke="url(#g)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Vertical center line -->
  <line x1="100" y1="10" x2="100" y2="190" stroke="url(#g)" stroke-width="2.5"/>

  <!-- Horizontal center line -->
  <line x1="10" y1="100" x2="190" y2="100" stroke="url(#g)" stroke-width="2.5"/>
  <!-- Connector stubs where horizontal line meets circle edge -->
  <rect x="25" y="94" width="9" height="12" fill="none" stroke="url(#g)" stroke-width="1.5"/>
  <rect x="166" y="94" width="9" height="12" fill="none" stroke="url(#g)" stroke-width="1.5"/>

  <!-- Circle -->
  <circle cx="100" cy="100" r="72" fill="none" stroke="url(#g)" stroke-width="2"/>

  <!-- === UPPER TREE === -->

  <!-- Level 1: main branches from trunk at y=90 -->
  <path d="M100,90 Q88,78 72,70" fill="none" stroke="url(#g)" stroke-width="2.5"/>
  <path d="M100,90 Q112,78 128,70" fill="none" stroke="url(#g)" stroke-width="2.5"/>

  <!-- Level 2 left: from (72,70) -->
  <path d="M72,70 Q58,68 40,66" fill="none" stroke="url(#g)" stroke-width="2"/>
  <path d="M72,70 Q65,58 60,44" fill="none" stroke="url(#g)" stroke-width="2"/>
  <path d="M72,70 Q68,62 64,52" fill="none" stroke="url(#g)" stroke-width="1.8"/>

  <!-- Level 2 right: from (128,70) -->
  <path d="M128,70 Q142,68 160,66" fill="none" stroke="url(#g)" stroke-width="2"/>
  <path d="M128,70 Q135,58 140,44" fill="none" stroke="url(#g)" stroke-width="2"/>
  <path d="M128,70 Q132,62 136,52" fill="none" stroke="url(#g)" stroke-width="1.8"/>

  <!-- Center upper branches from trunk at y=76 -->
  <path d="M100,76 Q93,63 86,50" fill="none" stroke="url(#g)" stroke-width="1.8"/>
  <path d="M100,76 Q107,63 114,50" fill="none" stroke="url(#g)" stroke-width="1.8"/>

  <!-- Circuit node circles at branch tips -->
  <circle cx="40" cy="66" r="5.5" fill="none" stroke="url(#g)" stroke-width="2"/>
  <circle cx="60" cy="44" r="5.5" fill="none" stroke="url(#g)" stroke-width="2"/>
  <circle cx="64" cy="52" r="4.5" fill="none" stroke="url(#g)" stroke-width="1.8"/>
  <circle cx="86" cy="50" r="4.5" fill="none" stroke="url(#g)" stroke-width="1.8"/>
  <circle cx="100" cy="28" r="6" fill="none" stroke="url(#g)" stroke-width="2"/>
  <circle cx="114" cy="50" r="4.5" fill="none" stroke="url(#g)" stroke-width="1.8"/>
  <circle cx="136" cy="52" r="4.5" fill="none" stroke="url(#g)" stroke-width="1.8"/>
  <circle cx="140" cy="44" r="5.5" fill="none" stroke="url(#g)" stroke-width="2"/>
  <circle cx="160" cy="66" r="5.5" fill="none" stroke="url(#g)" stroke-width="2"/>

  <!-- === LOWER ROOTS === -->

  <!-- Main root curves from center -->
  <path d="M100,100 Q88,112 72,122" fill="none" stroke="url(#g)" stroke-width="2.5"/>
  <path d="M100,100 Q112,112 128,122" fill="none" stroke="url(#g)" stroke-width="2.5"/>

  <!-- Root extensions (circuit-style angular bends) -->
  <path d="M72,122 L50,122 L50,150" fill="none" stroke="url(#g)" stroke-width="2"/>
  <path d="M128,122 L150,122 L150,150" fill="none" stroke="url(#g)" stroke-width="2"/>

  <!-- Leaf shapes on left roots -->
  <path d="M84,112 C79,106 71,109 73,117 C75,124 84,119 84,112 Z" fill="none" stroke="url(#g)" stroke-width="1.5"/>
  <path d="M59,126 C54,119 46,122 48,130 C50,137 59,133 59,126 Z" fill="none" stroke="url(#g)" stroke-width="1.5"/>

  <!-- Leaf shapes on right roots -->
  <path d="M116,112 C121,106 129,109 127,117 C125,124 116,119 116,112 Z" fill="none" stroke="url(#g)" stroke-width="1.5"/>
  <path d="M141,126 C146,119 154,122 152,130 C150,137 141,133 141,126 Z" fill="none" stroke="url(#g)" stroke-width="1.5"/>

  <!-- Bottom circles -->
  <circle cx="50" cy="158" r="7" fill="none" stroke="url(#g)" stroke-width="2"/>
  <circle cx="150" cy="158" r="7" fill="none" stroke="url(#g)" stroke-width="2"/>
</svg>
